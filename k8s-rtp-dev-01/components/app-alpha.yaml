name: app-alpha

src:
  repo: https://github.com/arutselvan15/gitops-app-alpha.git
  rev: main

application:
  src: gitops/argoapplication.yaml.j2
  kind: argoapplication

manifests:
  - src: helm/webapp
    name: app-alpha
    kind: helm
    namespace: hello-world
    values:
      replicaCount: 5
